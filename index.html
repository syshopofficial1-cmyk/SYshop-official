<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SYshop official</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen">

  <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-gray-100">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-gray-900 to-gray-700 rounded-xl flex items-center justify-center">
          <span class="text-white font-bold text-lg">SY</span>
        </div>
        <h1 class="text-xl font-bold text-gray-800">SYshop official</h1>
      </div>
      <a href="login.html" class="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-2">
        <i class="fa-solid fa-lock"></i> Admin
      </a>
    </div>
  </header>

  <section class="bg-gradient-to-r from-gray-900 via-gray-800 to-gray-900 text-white py-16">
    <div class="max-w-6xl mx-auto px-4 text-center">
      <h2 class="text-3xl md:text-5xl font-bold mb-4">✨ คอลเลคชั่นใหม่มาแล้ว ✨</h2>
      <p class="text-gray-300 text-lg mb-8">สินค้าคุณภาพ ดีไซน์ไม่ซ้ำใคร</p>
      <a href="#products" class="inline-block bg-white text-gray-900 px-8 py-3 rounded-full font-semibold hover:bg-gray-100">
        ดูสินค้าทั้งหมด <i class="fa-solid fa-arrow-down ml-2"></i>
      </a>
    </div>
  </section>

  <main id="products" class="max-w-6xl mx-auto px-4 py-12">
    <div class="flex justify-between items-center mb-8">
      <h3 class="text-2xl font-bold text-gray-800">สินค้าทั้งหมด</h3>
      <span id="productCount" class="text-gray-500 text-sm">กำลังโหลด...</span>
    </div>

    <div id="loading" class="text-center py-20">
      <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-gray-300 border-t-gray-900"></div>
      <p class="mt-4 text-gray-500">กำลังโหลดสินค้า...</p>
    </div>

    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    
    <div id="emptyState" class="text-center py-20 hidden">
      <i class="fa-solid fa-box-open text-6xl text-gray-300 mb-4"></i>
      <p class="text-gray-500 text-lg">ยังไม่มีสินค้าในขณะนี้</p>
    </div>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-12 py-8 text-center text-gray-500 text-sm">
    &copy; 2024 SYshop official. All rights reserved.
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { firebaseConfig, LINE_OA_URL } from "./js/config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loadingEl = document.getElementById('loading');
    const gridEl = document.getElementById('productGrid');
    const emptyEl = document.getElementById('emptyState');
    const countEl = document.getElementById('productCount');

    async function loadProducts() {
      try {
        const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        
        loadingEl.classList.add('hidden');
        
        if (snapshot.empty) {
          emptyEl.classList.remove('hidden');
          countEl.textContent = "0 สินค้า";
          return;
        }

        const products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        countEl.textContent = `${products.length} สินค้า`;
        
        products.forEach(p => {
          const isSoldOut = !p.inStock;
          const card = `
            <article class="product-card bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100 flex flex-col hover:transform hover:-translate-y-2 transition-all duration-300">
              <div class="relative h-64 overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200">
                <img src="${p.imageUrl || 'https://via.placeholder.com/400x300?text=No+Image'}" 
                     alt="${p.name}" 
                     class="w-full h-full object-cover"
                     onerror="this.src='https://via.placeholder.com/400x300?text=Image+Error'"/>
                ${isSoldOut ? `
                  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center">
                    <span class="bg-red-600 text-white px-5 py-2 rounded-full font-bold text-sm">
                      <i class="fa-solid fa-xmark mr-1"></i> สินค้าหมด
                    </span>
                  </div>
                ` : ''}
              </div>
              <div class="p-5 flex flex-col flex-grow">
                <h3 class="font-bold text-lg text-gray-800 mb-2">${p.name}</h3>
                <div class="mt-auto">
                  <div class="flex justify-between items-center mb-4">
                    <span class="text-2xl font-bold text-gray-900">฿${Number(p.price).toLocaleString()}</span>
                    ${isSoldOut 
                      ? '<span class="text-red-500 text-sm"><i class="fa-solid fa-circle-xmark"></i> หมด</span>'
                      : '<span class="text-green-600 text-sm"><i class="fa-solid fa-check-circle"></i> พร้อมส่ง</span>'
                    }
                  </div>
                  <a href="${isSoldOut ? '#' : LINE_OA_URL}" 
                     target="_blank"
                     class="${isSoldOut ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-green-500 to-green-600 text-white'} 
                            block w-full text-center py-3 rounded-xl font-semibold transition-all flex justify-center items-center gap-2"
                     ${isSoldOut ? 'onclick="return false"' : ''}>
                    <i class="fa-brands fa-line"></i>
                    ${isSoldOut ? 'หมดชั่วคราว' : 'สั่งซื้อผ่าน LINE'}
                  </a>
                </div>
              </div>
            </article>
          `;
          gridEl.innerHTML += card;
        });
        
        gridEl.classList.remove('hidden');
      } catch (error) {
        console.error("Error:", error);
        loadingEl.classList.add('hidden');
        gridEl.innerHTML = '<div class="col-span-full text-center text-red-500 py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
        gridEl.classList.remove('hidden');
      }
    }

    loadProducts();
  </script>
</body>
</html>
