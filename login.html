<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - SYshop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-2xl mb-4">
        <span class="text-white font-bold text-2xl">SY</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Admin Login</h1>
      <p class="text-gray-400 mt-2">เข้าสู่ระบบจัดการสินค้า</p>
    </div>

    <div class="bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">อีเมล</label>
          <input type="email" id="email" required
                 class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500"
                 placeholder="admin@syshop.com"/>
        </div>
        
        <div>
          <label class="block text-gray-300 text-sm font-medium mb-2">รหัสผ่าน</label>
          <input type="password" id="password" required
                 class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500"
                 placeholder="••••••••"/>
        </div>

        <p id="errorMsg" class="text-red-400 text-sm hidden bg-red-500/10 px-4 py-2 rounded-lg"></p>

        <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white font-semibold py-3 rounded-xl hover:from-green-600 hover:to-green-700 transition-all shadow-lg disabled:opacity-50">
          <span id="btnText">เข้าสู่ระบบ</span>
          <span id="btnLoading" class="hidden"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i>กำลังตรวจสอบ...</span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <a href="index.html" class="text-gray-400 hover:text-white text-sm">← กลับหน้าร้าน</a>
      </div>
    </div>

    <p class="text-center text-gray-500 text-xs mt-8">&copy; 2024 SYshop official</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { firebaseConfig } from "./js/config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnLoading = document.getElementById('btnLoading');
      const errorMsg = document.getElementById('errorMsg');
      
      submitBtn.disabled = true;
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      errorMsg.classList.add('hidden');

      try {
        await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
        window.location.href = 'admin.html';
      } catch (error) {
        errorMsg.textContent = "❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง";
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
